<style>
  html, body { margin: 0; padding: 0; background: #000000; }
  * { box-sizing: border-box; }
  ::selection { background: rgba(255,255,255,0.15); }
  .mosaic { display: flex; width: 100%; align-items: flex-start; }
  .col { flex: 1 1 0; min-width: 0; font-size: 0; line-height: 0; }
  .col img { width: 100%; height: auto; display: block; margin: 0; padding: 0; border: 0;
    vertical-align: bottom; background: #0a0a0a; opacity: 0; transition: opacity .5s ease; }
  .col img.on { opacity: 1; }
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.46); pointer-events: none; z-index: 5; }
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse 120% 90% at 50% 50%, rgba(0,0,0,0) 38%, rgba(0,0,0,0.55) 100%); }
  .titlewrap { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none; }
  .title { font-family: 'Cormorant', serif; font-weight: 300; color: #ffffff;
    font-size: clamp(40px, 9vw, 132px); letter-spacing: clamp(8px, 2.4vw, 40px);
    text-transform: uppercase; line-height: 1; text-indent: clamp(8px, 2.4vw, 40px);
    text-shadow: 0 2px 60px rgba(0,0,0,0.6); white-space: nowrap; }
  .player { position: fixed; right: 22px; bottom: 22px; z-index: 20; display: flex;
    align-items: center; gap: 11px; padding: 9px 15px 9px 9px; background: rgba(10,10,12,0.55);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 40px; cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5); user-select: none; max-width: 240px; }
  .player .icon { width: 26px; height: 26px; min-width: 26px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 9px; line-height: 1; }
  .player .meta { display: flex; flex-direction: column; line-height: 1.25; overflow: hidden; }
  .player .track { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .player .status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.4); white-space: nowrap; }
  #yt { position: fixed; width: 1px; height: 1px; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <div class="mosaic" id="mosaic">

    <div class="icon" id="icon">&#9658;</div>
    <div class="meta">
      <span class="track" id="track">Shuffle Mix</span>

<script>

400.webp 400w, images/22-800.webp 800w, images/22-1080.webp 1080w", "22.webp", 1080, 1920], "23": ["images/23-400.webp 400w, images/23-736.webp 736w", "23.jpg", 736, 1308], "24": ["images/24-400.webp 400w, images/24-675.webp 675w", "24.jpg", 675, 1200], "25": ["images/25-400.webp 400w, images/25-800.webp 800w, images/25-1080.webp 1080w", "25.jpg", 1080, 1920], "26": ["images/26-400.webp 400w, images/26-800.webp 800w, images/26-979.webp 979w", "26.webp", 979, 1920], "27": ["images/27-400.webp 400w, images/27-800.webp 800w, images/27-1200.webp 1200w", "27.jpg", 1200, 2133], "28": ["images/28-400.webp 400w, images/28-736.webp 736w", "28.jpg", 736, 740], "29": ["images/29-400.webp 400w, images/29-736.webp 736w", "29.webp", 736, 1308], "30": ["images/30-400.webp 400w, images/30-800.webp 800w, images/30-1080.webp 1080w", "30.jpg", 1080, 1920], "31": ["images/31-400.webp 400w, images/31-736.webp 736w", "31.webp", 736, 1472], "33": ["images/33-400.webp 400w, images/33-736.webp 736w", "33.jpg", 736, 1152], "34": ["images/34-400.webp 400w, images/34-540.webp 540w", "34.jpg", 540, 540], "35": ["images/35-400.webp 400w, images/35-600.webp 600w", "35.webp", 600, 1200], "36": ["images/36-400.webp 400w, images/36-675.webp 675w", "36.jpg", 675, 1200], "37": ["images/37-400.webp 400w, images/37-736.webp 736w", "37.jpg", 736, 736], "38": ["images/38-400.webp 400w, images/38-698.webp 698w", "38.jpg", 698, 719], "39": ["images/39-400.webp 400w, images/39-736.webp 736w", "39.webp", 736, 1104], "40": ["images/40-400.webp 400w, images/40-720.webp 720w", "40.webp", 720, 900], "41": ["images/41-400.webp 400w, images/41-736.webp 736w", "41.jpg", 736, 736], "42": ["images/42-400.webp 400w, images/42-800.webp 800w, images/42-1080.webp 1080w", "42.jpg", 1080, 1920], "43": ["images/43-400.webp 400w, images/43-736.webp 736w", "43.jpg", 736, 920], "44": ["images/44-400.webp 400w, images/44-736.webp 736w", "44.jpg", 736, 736], "45": ["images/45-400.webp 400w, images/45-800.webp 800w, images/45-1200.webp 1200w", "45.webp", 1200, 1710], "46": ["images/46-400.webp 400w, images/46-736.webp 736w", "46.jpg", 736, 736], "47": ["images/47-400.webp 400w, images/47-736.webp 736w", "47.jpg", 736, 1308], "48": ["images/48-400.webp 400w, images/48-676.webp 676w", "48.webp", 676, 1200], "49": ["images/49-400.webp 400w, images/49-715.webp 715w", "49.jpg", 715, 1098], "50": ["images/50-400.webp 400w, images/50-800.webp 800w, images/50-1080.webp 1080w", "50.webp", 1080, 1920], "51": ["images/51-400.webp 400w, images/51-564.webp 564w", "51.jpg", 564, 705], "52": ["images/52-400.webp 400w, images/52-736.webp 736w", "52.jpg", 736, 736], "53": ["images/53-400.webp 400w, images/53-547.webp 547w", "53.webp", 547, 1200], "54": ["images/54-400.webp 400w, images/54-800.webp 800w, images/54-804.webp 804w", "54.webp", 804, 1024], "55": ["images/55-400.webp 400w, images/55-800.webp 800w, images/55-1152.webp 1152w", "55.jpg", 1152, 2048], "56": ["images/56-400.webp 400w, images/56-800.webp 800w, images/56-1080.webp 1080w", "56.webp", 1080, 1920], "57": ["images/57-400.webp 400w, images/57-800.webp 800w, images/57-981.webp 981w", "57.jpg", 981, 1920], "58": ["images/58-400.webp 400w, images/58-736.webp 736w", "58.webp", 736, 1307], "59": ["images/59-400.webp 400w, images/59-800.webp 800w, images/59-1200.webp 1200w", "59.jpg", 1200, 927], "60": ["images/60-400.webp 400w, images/60-736.webp 736w", "60.jpg", 736, 736]};
  var CORE = [["16", "06", "58", "13", "50", "20", "56", "38", "07", "09", "04", "19", "11", "10"], ["47", "28", "27", "36", "37", "18", "15", "42", "41", "59", "52", "24", "35", "60", "08", "02"], ["53", "55", "21", "25", "31", "46", "23", "30", "29", "12", "03", "34", "45", "17"], ["51", "40", "33", "26", "39", "14", "49", "43", "44", "22", "57", "05", "01", "48", "54"]];
  var NUMS = Object.keys(POOL);

  // ---- başlangıçta çekirdeğin kaç piksel içinden açılsın (0 = en üstünden) ----
  var START_OFFSET = 0;

  var cols = [document.getElementById('c0'),document.getElementById('c1'),
              document.getElementById('c2'),document.getElementById('c3')];
  var colR = [0,0,0,0]; // sütun yükseklik oranı (denge için, reflow'suz)

  function makeImg(num){
    var a = POOL[num];
    var img = document.createElement('img');
    img.setAttribute('srcset', a[0]);
    img.setAttribute('sizes', '25vw');
    img.src = 'images/' + a[1];
    img.width = a[2]; img.height = a[3];
    img.loading = 'lazy'; img.decoding = 'async'; img.alt = '';
    img.onload = function(){ img.classList.add('on'); };
    img.onerror = function(){ img.onerror=null; img.removeAttribute('srcset'); img.removeAttribute('sizes'); img.src='images/'+a[1]; img.classList.add('on'); };
    return img;
  }
  function ratio(num){ var a=POOL[num]; return a[3]/a[2]; }
  function shortest(){ var mi=0,mh=colR[0]; for(var i=1;i<4;i++){ if(colR[i]<mh){mh=colR[i];mi=i;} } return mi; }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

  var TARGET=null;   // başlangıçta ortalanacak resim (en sol sütundaki 07)
  function buildCore(){
    for(var c=0;c<4;c++){
      for(var k=0;k<CORE[c].length;k++){
        var num=CORE[c][k];
        var im=makeImg(num);
        cols[c].appendChild(im);
        colR[c]+=ratio(num);
        if(c===0 && num==="07"){ TARGET=im; }
      }
    }
  }
  function appendBatch(){
    var s=shuffle(NUMS);
    for(var i=0;i<s.length;i++){ var c=shortest(); cols[c].appendChild(makeImg(s[i])); colR[c]+=ratio(s[i]); }
  }
  function prependBatch(){
    var before=document.documentElement.scrollHeight;
    var s=shuffle(NUMS);
    for(var i=0;i<s.length;i++){ var c=shortest(); cols[c].insertBefore(makeImg(s[i]), cols[c].firstChild); colR[c]+=ratio(s[i]); }
    var after=document.documentElement.scrollHeight;
    window.scrollTo(0, (window.scrollY||document.documentElement.scrollTop) + (after-before));
  }

  // ---- kurulum ----
  buildCore();
  appendBatch(); appendBatch();          // alta tampon
  prependBatch(); prependBatch();         // üste tampon (scroll telafili)
  // 7 numaralı resmin (en sol sütun) tam ortasını ekranın dikey ortasına (TEMET NOSCE hizası) getir
  function centerOnTarget(){
    if(!TARGET) return;
    var absTop = TARGET.getBoundingClientRect().top + (window.scrollY||document.documentElement.scrollTop);
    var center = absTop + TARGET.offsetHeight/2;
    window.scrollTo(0, Math.max(0, center - window.innerHeight/2));
  }
  // çift rAF: ilk düzen oturduktan sonra hizala (resim yüklemesini beklemeye gerek yok, yükseklikler oran ile ayrılıyor)
  requestAnimationFrame(function(){ requestAnimationFrame(centerOnTarget); });

  // ---- sonsuz kaydırma ----
  var MAXB=34, downB=2, upB=2, ticking=false;
  window.addEventListener('scroll', function(){
    if(ticking) return; ticking=true;
    requestAnimationFrame(function(){
      var st=window.scrollY||document.documentElement.scrollTop;
      var vh=window.innerHeight, sh=document.documentElement.scrollHeight;
      if(st+vh > sh-1600 && downB<MAXB){ appendBatch(); downB++; }
      if(st < 1600 && upB<MAXB){ prependBatch(); upB++; }
      ticking=false;
    });
  }, {passive:true});

  // ---- müzik: playlist + her açılışta gerçek shuffle ----
  var PLAYLIST = "PLAYYu5uCqghA";
  var player, ready=false, pending=false, playing=false, started=false;
  var iconEl=document.getElementById('icon'), statusEl=document.getElementById('status'), trackEl=document.getElementById('track');
  var tag=document.createElement('script'); tag.src="https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player('yt',{height:'1',width:'1',
      playerVars:{listType:'playlist', list:PLAYLIST, autoplay:0, controls:0, playsinline:1, loop:1},
      events:{'onReady':function(){ ready=true; try{player.setShuffle(true);}catch(e){} if(pending) doPlay(); },
        'onStateChange':function(e){
          if(e.data===YT.PlayerState.PLAYING){ setUI(true); updateTitle(); }
          if(e.data===YT.PlayerState.PAUSED){ setUI(false); }
        }}});
  };
  function updateTitle(){ try{ var d=player.getVideoData(); if(d&&d.title) trackEl.textContent=d.title; }catch(e){} }
  function setUI(on){ playing=on; iconEl.innerHTML=on?"&#10074;&#10074;":"&#9658;"; statusEl.textContent=on?"Now Playing":"Paused"; }
  function doPlay(){
    if(!ready){ pending=true; return; }
    try{
      player.unMute(); player.setVolume(80);
      if(!started){
        started=true;
        try{ player.setShuffle(true); }catch(e){}
        var n=0; try{ var pl=player.getPlaylist(); n=(pl&&pl.length)?pl.length:0; }catch(e){}
        if(n>0){ player.playVideoAt(Math.floor(Math.random()*n)); } else { player.playVideo(); }
      } else { player.playVideo(); }
    }catch(e){}
  }
  function doPause(){ try{ player.pauseVideo(); }catch(e){} }
  document.getElementById('player').addEventListener('click',function(){ if(playing) doPause(); else doPlay(); });
</script>
